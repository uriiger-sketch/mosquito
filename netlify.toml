# Netlify deploy config — drag the mosquito folder onto netlify.com/drop
# or connect the GitHub repo at app.netlify.com

[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "microphone=self"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Clean URLs
[[redirects]]
  from = "/app"
  to = "/index.html"
  status = 200
